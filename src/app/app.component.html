<app-home *ngIf="!roomState && !reconnecting" (roomJoined)="onRoomJoined($event)"></app-home>
<div *ngIf="reconnecting && !roomState" class="reconnecting">Reconnecting...</div>
<app-room *ngIf="roomState" [roomState]="roomState"
  (roomUpdated)="onRoomUpdated($event)"
  (left)="onLeft()">
</app-room>
